<!DOCTYPE html>
<html lang="ur" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>خیبر پختونخوا رمضان پیکج 2026 - ضلع کرک</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>

:root{
--green:#0b7a38;
--dark:#065628;
}

body{

margin:0;
font-family:'Noto Nastaliq Urdu',serif;
background:url("ramzan-bg.png") center/cover no-repeat fixed;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;

}

/* HEADER */

.header{

width:100%;
max-width:480px;
background:linear-gradient(90deg,#0b7a38,#075b2a);
color:white;
padding:12px 10px;
border-radius:0 0 10px 10px;
position:relative;
box-shadow:0 4px 15px rgba(0,0,0,.3);

}

.header-inner{

display:flex;
align-items:center;
justify-content:center;
gap:12px;

}

.logo{

height:50px;

}

.header-text{

text-align:center;
line-height:1.4;

}

.header-text h1{

margin:0;
font-size:20px;

}

.header-text p{

margin:0;
font-size:13px;

}

/* MOON ICON */

.moon{

position:absolute;
top:8px;
left:10px;
height:45px;

}

/* MAIN AREA */

.main{

max-width:480px;
width:92%;
text-align:center;
color:white;
margin-top:20px;

}

.main h2{

font-size:32px;
margin-bottom:10px;

}

.main p{

margin-top:0;
font-size:15px;

}

/* INPUT */

.input-box{

background:white;
border-radius:10px;
padding:10px;
display:flex;
align-items:center;
gap:10px;
margin-top:20px;

}

.input-box img{

height:30px;

}

input{

flex:1;
border:none;
outline:none;
font-size:18px;
text-align:center;

}

/* BUTTON */

button{

margin-top:15px;
width:100%;
padding:12px;
font-size:18px;
background:linear-gradient(#0b7a38,#065628);
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

/* RESULT */

#result{

margin-top:20px;
display:none;
padding:15px;
border-radius:10px;

}

.success-box{

background:#ffffffdd;
color:#222;

}

.error-box{

background:#ffeaea;
color:#c53030;

}

.data-row{

display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:6px 0;

}

/* PRINT */

.btn-print{

margin-top:10px;
background:#555;

}

/* NOTICE */

.notice{

background:#ffffffdd;
margin-top:20px;
padding:15px;
border-radius:10px;
color:#333;
font-size:14px;

}

/* FOOTER */

footer{

color:white;
margin-top:15px;
text-align:center;
font-size:13px;

}

</style>

</head>

<body>

<div class="header">

<img src="moon.png" class="moon">

<div class="header-inner">

<img src="KP_logo.png" class="logo">

<div class="header-text">

<h1>حکومت خیبر پختونخوا</h1>
<p>رمضان مشن کوالیٹی — ضلع کرک</p>

</div>

</div>

</div>


<div class="main">

<h2>اپنی اہلیت چیک کریں</h2>

<p>اپنا 13 ہندسوں کا شناختی کارڈ نمبر درج کریں</p>

<div class="input-box">

<img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">

<input type="text" id="cnicInput" maxlength="13" placeholder="شناختی کارڈ نمبر">

</div>

<button onclick="handleSearch()">اسٹیٹس چیک کریں</button>

<div id="result"></div>

<div class="notice">

یہ سہولت ضلعی انتظامیہ کرک کی جانب سے عوام الناس کی سہولت کے لئے فراہم کی گئی ہے۔

<hr>

خصوصی شکریہ ڈپٹی کمشنر کرک

</div>

<footer>

© 2026 ضلعی انتظامیہ کرک

<br>

تیار کردہ: <strong>NASRULLAH KHATTAK</strong>

</footer>

</div>


<script>

let excelData=[];

window.onload=async()=>{

try{

const response=await fetch('payment.xlsx');
const arrayBuffer=await response.arrayBuffer();
const data=new Uint8Array(arrayBuffer);

const workbook=XLSX.read(data,{type:'array'});

excelData=XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

}

catch(e){

console.error("Database connection failed",e);

}

};

function handleSearch(){

const input=document.getElementById('cnicInput').value.trim();
const resultDiv=document.getElementById('result');

if(!/^\d{13}$/.test(input)){

resultDiv.className="error-box";
resultDiv.innerHTML="براہ کرم 13 ہندسوں کا شناختی کارڈ نمبر درج کریں";
resultDiv.style.display="block";
return;

}

const record=excelData.find(row=>String(row.cnic).trim()===input);

if(record){

resultDiv.className="success-box";

resultDiv.innerHTML=`

<div class="data-row"><span>شناختی کارڈ</span><span>${record.cnic}</span></div>
<div class="data-row"><span>مستحق فرد</span><span>${record.name}</span></div>
<div class="data-row"><span>ٹرانزیکشن آئی ڈی</span><span>${record.ID}</span></div>
<div class="data-row"><span>تاریخ</span><span>${record.date}</span></div>
<div class="data-row"><span>رقم</span><span>Rs ${record.amount}</span></div>

<button class="btn-print" onclick="window.print()">پرنٹ کریں</button>

`;

}

else{

resultDiv.className="error-box";
resultDiv.innerHTML="آپ اس پروگرام کے مستحق افراد میں شامل نہیں ہیں";

}

resultDiv.style.display="block";

}

document.getElementById("cnicInput").addEventListener("keypress",function(e){

if(e.key==="Enter") handleSearch();

});

</script>

</body>

</html>
